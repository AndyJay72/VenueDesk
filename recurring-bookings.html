<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recurring Bookings | VenueDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        (function(){
            var token = sessionStorage.getItem('vp_token');
            if (!token) { window.location.href = 'login.html?return=' + encodeURIComponent(location.pathname.split('/').pop()); return; }
            try {
                var parts = token.split('.');
                if (parts.length === 3) {
                    var payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
                    if (payload.exp && Date.now() / 1000 > payload.exp) {
                        sessionStorage.removeItem('vp_token');
                        window.location.href = 'login.html';
                    }
                }
            } catch(e) {}
        })();
    </script>
    <style>
        :root {
            --bg:#0f172a;--sidebar-bg:#1e293b;--card-bg:#1e293b;
            --border:rgba(148,163,184,0.12);--text-main:#e2e8f0;
            --text-muted:#94a3b8;--primary:#6366f1;--success:#22c55e;
            --warning:#f59e0b;--danger:#ef4444;--sidebar-width:240px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-main);display:flex;min-height:100vh;}
        aside{position:fixed;top:0;left:0;height:100vh;width:var(--sidebar-width);background:var(--sidebar-bg);padding:1.5rem 1rem;display:flex;flex-direction:column;z-index:200;border-right:1px solid var(--border);transition:transform .3s;overflow-y:auto;}
        main{margin-left:var(--sidebar-width);flex:1;padding:1.5rem;min-height:100vh;}
        .brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;font-size:1.15rem;font-weight:700;}
        .brand i{color:var(--primary);margin-right:8px;}
        .brand-text{white-space:nowrap;overflow:hidden;transition:opacity .2s,width .2s;}
        .close-sidebar,.sidebar-collapse-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .2s;}
        .close-sidebar{display:none;font-size:1.2rem;}
        .sidebar-collapse-btn{font-size:.85rem;}
        .close-sidebar:hover,.sidebar-collapse-btn:hover{color:var(--text-main);background:rgba(255,255,255,.06);}
        nav{display:flex;flex-direction:column;height:100%;}
        .nav-link{display:flex;align-items:center;gap:12px;padding:12px 16px;color:var(--text-muted);text-decoration:none;border-radius:8px;margin-bottom:5px;transition:all .2s;font-weight:500;}
        .nav-link:hover,.nav-link.active{background:rgba(99,102,241,.1);color:var(--primary);}
        .nav-label{white-space:nowrap;overflow:hidden;transition:opacity .2s,width .2s;}
        .menu-toggle{display:none;background:none;border:none;color:var(--text-main);font-size:1.4rem;cursor:pointer;margin-right:12px;}
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;}
        .overlay.open{display:block;}

        /* Light mode */
        body.light-mode{background:#f1f5f9;color:#1e293b;}
        body.light-mode aside{background:#fff;border-right-color:#e2e8f0;}
        body.light-mode .nav-link{color:#475569;}
        body.light-mode .nav-link:hover,body.light-mode .nav-link.active{background:rgba(99,102,241,.1);color:var(--primary);}
        body.light-mode input,body.light-mode select,body.light-mode textarea{background:#fff!important;color:#1e293b!important;border-color:#cbd5e1!important;}
        body.light-mode .form-input{background:#fff!important;color:#1e293b!important;border-color:#cbd5e1!important;}
        body.light-mode .form-input:focus{border-color:#6366f1!important;background:#fff!important;}
        body.light-mode .mode-tabs{background:#f1f5f9!important;border-color:#cbd5e1!important;}
        body.light-mode .mode-tab{color:#64748b!important;}
        body.light-mode .freq-btn{background:#f1f5f9!important;border-color:#cbd5e1!important;color:#475569!important;}
        body.light-mode .freq-btn.active{background:var(--primary)!important;color:#fff!important;border-color:var(--primary)!important;}
        body.light-mode .preview-box{background:rgba(99,102,241,.07)!important;color:#4f46e5!important;border-color:rgba(99,102,241,.25)!important;}
        body.light-mode .sep{border-top-color:#e2e8f0!important;}

        /* Sidebar collapse */
        body.sidebar-collapsed aside{width:64px;padding:1.5rem .5rem;}
        body.sidebar-collapsed main{margin-left:64px;}
        body.sidebar-collapsed .brand-text,body.sidebar-collapsed .nav-label{opacity:0;width:0;overflow:hidden;}
        body.sidebar-collapsed .nav-link{justify-content:center;gap:0;padding:12px 8px;font-size:1.05rem;position:relative;}
        body.sidebar-collapsed .nav-link:hover::after{content:attr(data-label);position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:rgba(15,23,42,.97);color:var(--text-main);padding:5px 12px;border-radius:7px;font-size:.82rem;white-space:nowrap;pointer-events:none;border:1px solid var(--border);z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.4);}

        @media(max-width:768px){
            aside{transform:translateX(-100%);}
            aside.open{transform:translateX(0);}
            main{margin-left:0;}
            .menu-toggle{display:block;}
            .close-sidebar{display:block;}
            body.sidebar-collapsed aside{width:var(--sidebar-width);padding:1.5rem 1rem;}
            body.sidebar-collapsed main{margin-left:0;}
            body.sidebar-collapsed .brand-text,.brand-text,body.sidebar-collapsed .nav-label,.nav-label{opacity:1;width:auto;}
            body.sidebar-collapsed .nav-link{justify-content:flex-start;gap:12px;padding:12px 16px;font-size:inherit;}
        }

        /* Page layout */
        .page-layout{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start;}
        @media(max-width:1200px){.page-layout{grid-template-columns:1fr;}}

        /* ── Manage Panel ── */
        .manage-panel{background:var(--card-bg);border:1px solid rgba(148,163,184,0.15);border-radius:16px;padding:1.4rem;box-shadow:0 4px 24px rgba(0,0,0,.25);grid-column:1/-1;}
        .mp-series-grid{display:flex;flex-direction:column;gap:1rem;margin-top:1rem;}
        .mp-card{background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.12);border-radius:12px;overflow:hidden;}
        .mp-card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;gap:12px;flex-wrap:wrap;}
        .mp-card-title{font-size:.95rem;font-weight:700;color:var(--text-main);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .mp-card-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:.78rem;color:var(--text-muted);margin-top:6px;}
        .mp-card-meta span{display:flex;align-items:center;gap:4px;}
        .mp-card-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0;}
        .mp-btn{padding:6px 13px;border-radius:8px;font-size:.76rem;font-weight:700;cursor:pointer;border:1px solid;font-family:inherit;transition:all .15s;white-space:nowrap;}
        .mp-btn-pay{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.35);color:#34d399;}
        .mp-btn-pay:hover{background:rgba(16,185,129,.2);}
        .mp-btn-sessions{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.35);color:#a5b4fc;}
        .mp-btn-sessions:hover{background:rgba(99,102,241,.2);}
        .mp-btn-cancel{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#f87171;}
        .mp-btn-cancel:hover{background:rgba(239,68,68,.18);}
        .mp-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.71rem;font-weight:700;}
        .mp-badge-paid{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);}
        .mp-badge-pending{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}
        .mp-badge-overdue{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3);}
        .mp-badge-inactive{background:rgba(100,116,139,.12);color:var(--text-muted);border:1px solid rgba(100,116,139,.2);}
        .mp-sessions-wrap{border-top:1px solid rgba(148,163,184,.1);padding:12px 16px;display:none;}
        .mp-sessions-wrap.open{display:block;}
        .mp-sess-table{width:100%;border-collapse:collapse;font-size:.8rem;}
        .mp-sess-table th{padding:7px 10px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);border-bottom:1px solid rgba(148,163,184,.1);}
        .mp-sess-table td{padding:8px 10px;border-bottom:1px solid rgba(148,163,184,.06);color:var(--text-main);vertical-align:middle;}
        .mp-sess-table tr:last-child td{border-bottom:none;}
        .mp-sess-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:700;}
        .mp-sess-badge.confirmed,.mp-sess-badge.fully_paid,.mp-sess-badge.deposit_paid{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}
        .mp-sess-badge.pending{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25);}
        .mp-sess-badge.cancelled{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}
        .mp-sess-cancel-btn{padding:3px 9px;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.07);color:#f87171;font-family:inherit;}
        .mp-pay-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center;}
        .mp-pay-modal.open{display:flex;}
        .mp-pay-box{background:var(--card-bg);border:1px solid rgba(148,163,184,.15);border-radius:16px;padding:1.8rem;width:min(420px,94vw);box-shadow:0 12px 40px rgba(0,0,0,.5);}
        .mp-pay-box h3{font-size:1rem;font-weight:700;margin:0 0 1.2rem;color:var(--text-main);}
        .mp-pay-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
        .mp-pay-label{font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
        .mp-pay-input{padding:9px 12px;border-radius:8px;border:1px solid rgba(148,163,184,.2);background:rgba(255,255,255,.05);color:var(--text-main);font-size:.88rem;font-family:inherit;outline:none;width:100%;box-sizing:border-box;}
        .mp-pay-input:focus{border-color:rgba(99,102,241,.5);}
        .mp-pay-actions{display:flex;gap:10px;margin-top:1.2rem;}
        .mp-pay-confirm{flex:1;padding:11px;background:linear-gradient(135deg,#10b981,#34d399);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;}
        .mp-pay-confirm:disabled{opacity:.4;cursor:not-allowed;}
        .mp-pay-skip{padding:11px 16px;background:transparent;border:1px solid rgba(148,163,184,.2);color:var(--text-muted);border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;}
        .mp-empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:.88rem;}

        /* Manage panel title */
        .panel-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px;color:var(--text-main);}
        .panel-title i{color:var(--primary);}

        /* Toast */
        #toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
        .toast{padding:12px 18px;border-radius:10px;font-size:.87rem;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.35);animation:toastIn .25s ease;max-width:340px;}
        .toast.success{background:#16a34a;}
        .toast.error{background:#dc2626;}
        .toast.info{background:#2563eb;}
        @keyframes toastIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        /* Theme btn */
        .theme-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:.85rem;transition:all .2s;}
        .theme-btn:hover{color:var(--text-main);border-color:var(--text-muted);}

    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<aside id="sidebar">
    <div class="brand">
        <span><i class="fa-solid fa-layer-group"></i><span class="brand-text">VenueDesk</span></span>
        <div style="display:flex;align-items:center;gap:2px;">
            <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()" title="Collapse sidebar"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="close-sidebar" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>
    <nav>
        <a href="index.html" class="nav-link" data-label="Dashboard"><i class="fa-solid fa-chart-pie"></i><span class="nav-label"> Dashboard</span></a>
        <a href="calendar.html" class="nav-link" data-label="Calendar"><i class="fa-solid fa-calendar-alt"></i><span class="nav-label"> Calendar</span></a>

<main>
    <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
        <div style="display:flex;align-items:center">

    <!-- MANAGE view -->

                <div>
                    <div class="panel-title" style="margin-bottom:4px;"><i class="fa-solid fa-list-check"></i> Recurring Series &amp; Payment Management</div>

            </div>
            <div id="mp-series-grid" class="mp-series-grid">
                <div class="mp-empty"><i class="fa-solid fa-spinner fa-spin" style="font-size:1.4rem;margin-bottom:8px;display:block;"></i>Loading series…</div>

<!-- Record Payment Modal -->
<div class="mp-pay-modal" id="mp-pay-modal">

<div id="toast-container"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG & HELPERS
═══════════════════════════════════════════════════ */

function _TID(){ return sessionStorage.getItem('vp_tenant_id')||'0'; }
function getAuthHeaders(){ return {}; }
function tidUrl(base){ return base+(base.includes('?')?'&':'?')+'tenant_id='+_TID(); }
function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

/* ─── Toast ───────────────────────────────────────── */
function showToast(msg,type){
    var c=document.getElementById('toast-container');
    var t=document.createElement('div');
    t.className='toast '+(type||'info');
    t.textContent=msg;
    c.appendChild(t);
    setTimeout(function(){t.remove();},4500);
}

/* ─── Theme / Sidebar ─────────────────────────────── */
(function(){
    if(localStorage.getItem('vp_light_mode')==='1') document.body.classList.add('light-mode');
    if(localStorage.getItem('vp_sidebar_collapsed')==='1') document.body.classList.add('sidebar-collapsed');
    var el=document.getElementById('user-display');
    if(el){ try{ var u=JSON.parse(sessionStorage.getItem('vp_user')||'{}'); el.textContent=u.name||u.username||''; }catch(e){ el.textContent=sessionStorage.getItem('vp_user')||''; } }
})();
function toggleTheme(){ document.body.classList.toggle('light-mode'); localStorage.setItem('vp_light_mode',document.body.classList.contains('light-mode')?'1':'0'); }
function toggleMenu(){ var sb=document.getElementById('sidebar'),ov=document.getElementById('overlay'); sb.classList.toggle('open'); ov.classList.toggle('open'); }
function toggleSidebarCollapse(){ document.body.classList.toggle('sidebar-collapsed'); localStorage.setItem('vp_sidebar_collapsed',document.body.classList.contains('sidebar-collapsed')?'1':'0'); }
function logout(){ if(confirm('Log out?')){ ['vp_token','vp_user','vp_tenant_id','vp_venue_id','vp_venue_name'].forEach(function(k){sessionStorage.removeItem(k);}); window.location.href='login.html'; } }

/* ═══════════════════════════════════════════════════
   VIEW SWITCHER
═══════════════════════════════════════════════════ */
const REC_MANAGE_URL   = 'https://n8n.srv1090894.hstgr.cloud/webhook/get-recurring-bookings';
const REC_PAYMENT_URL  = 'https://n8n.srv1090894.hstgr.cloud/webhook/record-recurring-payment';
const REC_ALL_BKG_URL  = 'https://n8n.srv1090894.hstgr.cloud/webhook/all-bookings';
const REC_CANCEL_URL   = 'https://n8n.srv1090894.hstgr.cloud/webhook/cancel-booking';

let _mpPayData = {};
let _allSessions = [];

function mpFmt(v){ return '£' + (parseFloat(v)||0).toFixed(2); }
function mpFmtDate(s){ return s ? new Date(s.split('T')[0]+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—'; }
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ─── Load all recurring series ─────────────────── */
async function mpLoadSeries() {
    const grid = document.getElementById('mp-series-grid');
    grid.innerHTML = '<div class="mp-empty"><i class="fa-solid fa-spinner fa-spin" style="font-size:1.4rem;margin-bottom:8px;display:block;"></i>Loading series…</div>';
    try {
        // Load series + all bookings in parallel
        const [seriesRes, bkgRes] = await Promise.all([
            fetch(REC_MANAGE_URL + '?tenant_id=' + _TID(), { headers: getAuthHeaders() }),
            fetch(REC_ALL_BKG_URL + '?tenant_id=' + _TID(), { headers: getAuthHeaders() })
        ]);
        const seriesJson = await seriesRes.json();
        const bkgJson    = await bkgRes.json();

        const series = seriesJson.data || (Array.isArray(seriesJson) ? seriesJson : []);
        const allBkg = bkgJson.data || (Array.isArray(bkgJson) ? bkgJson : []);

        // Cache all bookings for session expansion
        _allSessions = allBkg.filter(b => b.is_recurring || b.recurring_rule_id);

        if (!series.length) {
            grid.innerHTML = '<div class="mp-empty"><i class="fa-solid fa-calendar-xmark" style="font-size:1.8rem;margin-bottom:8px;display:block;color:var(--text-muted);"></i>No active recurring series found.</div>';
            return;
        }

        grid.innerHTML = series.map(s => mpRenderCard(s)).join('');
    } catch(e) {
        grid.innerHTML = '<div class="mp-empty" style="color:var(--danger);"><i class="fa-solid fa-triangle-exclamation" style="display:block;font-size:1.4rem;margin-bottom:8px;"></i>Error loading series: ' + e.message + '</div>';
    }
}

/* ─── Render a single series card ───────────────── */
function mpRenderCard(s) {
    const ruleId    = s.rule_id || '';
    const total     = parseInt(s.total_bookings || 0);
    const pending   = parseInt(s.pending_count || 0);
    const confirmed = parseInt(s.confirmed_count || 0);
    const cancelled = parseInt(s.cancelled_count || 0);
    const ratePS    = parseFloat(s.rate_per_session || 0);
    const amtDue    = parseFloat(s.amount_due || 0);
    const pStat     = (s.payment_status || 'pending').toLowerCase();
    const dayName   = s.day_of_week != null ? DAYS[s.day_of_week] || '?' : '?';
    const safeId    = ruleId.replace(/[^a-zA-Z0-9-]/g,'');
    const safeName  = (s.customer_name||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');

    // Payment status badge
    const now = new Date();
    const isOverdue = pStat === 'pending' && s.due_date && new Date(s.due_date) < now;
    const badgeClass = pStat === 'paid' ? 'mp-badge-paid'
                     : isOverdue         ? 'mp-badge-overdue'
                     : pStat === 'pending' ? 'mp-badge-pending'
                     : 'mp-badge-inactive';
    const badgeLabel = pStat === 'paid' ? '<i class="fa-solid fa-check"></i> Paid'
                     : isOverdue         ? '<i class="fa-solid fa-exclamation"></i> Overdue'
                     : pStat === 'pending' ? '<i class="fa-solid fa-hourglass-half"></i> Pending'
                     : pStat;

    const canPay    = pStat === 'pending' && amtDue > 0;
    const hasFuture = pending + confirmed > 0;

    const periodInfo = s.period_start
        ? `${mpFmtDate(s.period_start)} – ${mpFmtDate(s.period_end)}`
        : 'No billing period set';
    const amountInfo = amtDue > 0 ? ` · <strong style="color:${isOverdue ? 'var(--danger)' : canPay ? 'var(--warning)' : 'var(--text-main)'};">${mpFmt(amtDue)}</strong> due ${mpFmtDate(s.due_date)}` : '';

    return `<div class="mp-card" id="mp-card-${safeId}">
        <div class="mp-card-header">
            <div style="min-width:0;">
                <div class="mp-card-title">
                    <i class="fa-solid fa-repeat" style="color:#a5b4fc;font-size:.85rem;flex-shrink:0;"></i>
                    ${s.customer_name || 'Unknown'}
                    <span style="font-size:.75rem;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;padding:2px 9px;border-radius:20px;font-weight:700;">${(s.frequency||'weekly').charAt(0).toUpperCase()+(s.frequency||'weekly').slice(1)}</span>
                    ${!s.active ? '<span style="font-size:.72rem;background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.2);color:var(--text-muted);padding:2px 8px;border-radius:20px;">Inactive</span>' : ''}
                </div>
                <div class="mp-card-meta" style="margin-top:6px;">
                    <span><i class="fa-solid fa-layer-group"></i> ${s.room_name || '—'}</span>
                    <span><i class="fa-solid fa-calendar-day"></i> ${dayName}s</span>
                    <span><i class="fa-solid fa-clock"></i> ${(s.start_time||'').slice(0,5)} – ${(s.end_time||'').slice(0,5)}</span>
                    ${ratePS > 0 ? `<span><i class="fa-solid fa-sterling-sign"></i> ${mpFmt(ratePS)}/session</span>` : ''}
                    <span style="color:${pending > 0 ? 'var(--warning)' : 'var(--text-muted)'}"><i class="fa-solid fa-calendar-check"></i> ${total} sessions (${pending} upcoming · ${confirmed} confirmed · ${cancelled} cancelled)</span>
                </div>
                <div style="font-size:.77rem;color:var(--text-muted);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    ${periodInfo}${amountInfo}
                </div>
            </div>
            <div class="mp-card-actions">
                ${canPay ? `<button class="mp-btn mp-btn-pay" onclick="mpOpenPayModal('${ruleId}','${safeName}','${s.schedule_id||''}','${amtDue}','${s.period_start||''}','${s.period_end||''}','${s.customer_id||''}')"><i class="fa-solid fa-sterling-sign"></i> Record Payment</button>` : ''}
                <button class="mp-btn mp-btn-sessions" onclick="mpToggleSessions('${safeId}','${ruleId}')"><i class="fa-solid fa-list"></i> Sessions</button>
                ${hasFuture ? `<button class="mp-btn mp-btn-cancel" onclick="mpCancelSeries('${ruleId}','${safeName}')"><i class="fa-solid fa-ban"></i> Cancel</button>` : ''}
                <span class="mp-badge ${badgeClass}">${badgeLabel}</span>
            </div>
        </div>
        <div class="mp-sessions-wrap" id="mp-sess-${safeId}">
            <div style="color:var(--text-muted);font-size:.8rem;"><i class="fa-solid fa-spinner fa-spin"></i> Loading sessions…</div>
        </div>
    </div>`;
}

/* ─── Toggle session list for a series ──────────── */
function mpToggleSessions(safeId, ruleId) {
    const wrap = document.getElementById('mp-sess-' + safeId);
    if (wrap.classList.contains('open')) {
        wrap.classList.remove('open');
        return;
    }
    wrap.classList.add('open');
    const sessions = _allSessions.filter(b => b.recurring_rule_id === ruleId);
    if (!sessions.length) {
        wrap.innerHTML = '<div style="font-size:.8rem;color:var(--text-muted);padding:4px 0;">No sessions found for this series. (Sessions may still be loading — try Refresh.)</div>';
        return;
    }
    sessions.sort((a,b) => new Date(a.date_from||a.booking_date||0) - new Date(b.date_from||b.booking_date||0));
    const today = new Date(); today.setHours(0,0,0,0);
    wrap.innerHTML = `<table class="mp-sess-table">
        <thead><tr>
            <th>Date</th><th>Time</th><th>Room</th><th>Status</th><th>Amount</th><th>Balance</th><th></th>
        </tr></thead>
        <tbody>
        ${sessions.map(r => {
            const d     = r.date_from || r.booking_date || '';
            const dt    = d ? new Date(d.split('T')[0]+'T00:00:00') : null;
            const fDate = dt ? dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}) : '—';
            const isPast = dt && dt < today;
            const isCan  = (r.status||'') === 'cancelled';
            const isFut  = dt && dt >= today && !isCan;
            const statCls = isCan ? 'cancelled' : isPast ? 'confirmed' : (r.status||'pending');
            const statLbl = isCan ? 'Cancelled' : isPast ? 'Past' : (r.status||'pending').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            const cancelBtn = isFut ? `<button class="mp-sess-cancel-btn" onclick="mpCancelSession('${r.id}','${(r.customer_name||'').replace(/'/g,'')}','${d}')"><i class="fa-solid fa-xmark"></i></button>` : '';
            return `<tr style="${isCan ? 'opacity:0.45;' : isPast ? 'opacity:0.7;' : ''}">
                <td>${fDate}</td>
                <td style="white-space:nowrap;">${(r.start_time||'').slice(0,5)} – ${(r.end_time||'').slice(0,5)}</td>
                <td>${r.room_name||'—'}</td>
                <td><span class="mp-sess-badge ${statCls}">${statLbl}</span></td>
                <td>${mpFmt(r.total_amount)}</td>
                <td style="color:${parseFloat(r.balance_due)>0?'var(--warning)':'var(--success)'};">${mpFmt(r.balance_due)}</td>
                <td>${cancelBtn}</td>
            </tr>`;
        }).join('')}
        </tbody>
    </table>`;
}

/* ─── Cancel a single session ───────────────────── */
async function mpCancelSession(bookingId, customerName, dateStr) {
    const dateLabel = dateStr ? new Date(dateStr+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}) : dateStr;
    if (!confirm(`Cancel the session on ${dateLabel} for ${customerName}?\n\nThis session only will be cancelled. The rest of the series continues.`)) return;
    try {
        const res = await fetch(REC_CANCEL_URL, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ booking_id: bookingId, tenant_id: parseInt(_TID()), performed_by: 'Staff' })
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        showToast('Session cancelled', 'success');
        await mpLoadSeries();
    } catch(e) { showToast('Cancel failed: ' + e.message, 'error'); }
}

/* ─── Cancel entire series ──────────────────────── */
async function mpCancelSeries(ruleId, customerName) {
    if (!confirm(`Cancel the ENTIRE recurring series for ${customerName}?\n\nAll upcoming sessions will be cancelled. Past sessions are unaffected.`)) return;
    try {
        const upcoming = _allSessions.filter(b => {
            if (b.recurring_rule_id !== ruleId) return false;
            if ((b.status||'') === 'cancelled') return false;
            const d = b.date_from || b.booking_date;
            return d && new Date(d) >= new Date();
        });
        if (!upcoming.length) { showToast('No upcoming sessions to cancel', 'info'); return; }
        for (const b of upcoming) {
            await fetch(REC_CANCEL_URL, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ booking_id: b.id, tenant_id: parseInt(_TID()), performed_by: 'Staff' })
            });
        }
        showToast(`Series cancelled — ${upcoming.length} sessions removed`, 'success');
        await mpLoadSeries();
    } catch(e) { showToast('Cancel failed: ' + e.message, 'error'); }
}

/* ─── Payment modal ─────────────────────────────── */
function mpOpenPayModal(ruleId, customerName, scheduleId, amtDue, periodStart, periodEnd, customerId) {
    _mpPayData = { ruleId, customerName, scheduleId, amtDue: parseFloat(amtDue)||0, customerId: customerId||'' };
    const periodLabel = (periodStart && periodEnd)
        ? `${mpFmtDate(periodStart)} – ${mpFmtDate(periodEnd)}`
        : 'Current billing period';
    document.getElementById('mp-pay-summary').innerHTML =
        `<strong style="color:var(--text-main);">${customerName}</strong><br>` +
        `Period: ${periodLabel}<br>Amount outstanding: <strong style="color:var(--warning);">${mpFmt(amtDue)}</strong>`;
    const amtInput = document.getElementById('mp-pay-amount');
    amtInput.value = (parseFloat(amtDue)||0).toFixed(2);
    document.getElementById('mp-pay-modal').classList.add('open');
}

function mpClosePayModal() {
    document.getElementById('mp-pay-modal').classList.remove('open');
    _mpPayData = {};
}

async function mpSubmitPayment() {
    const btn    = document.getElementById('mp-pay-confirm-btn');
    const amount = parseFloat(document.getElementById('mp-pay-amount').value)||0;
    const method = document.getElementById('mp-pay-method').value;
    if (amount <= 0) { showToast('Please enter a valid amount', 'error'); return; }
    btn.disabled = true;
    btn.textContent = 'Recording…';
    try {
        const payload = {
            rule_id:        _mpPayData.ruleId,
            customer_id:    _mpPayData.customerId || '',
            schedule_id:    _mpPayData.scheduleId || '',
            amount_paid:    amount,
            payment_method: method,
            payment_plan:   'per_period',
            tenant_id:      parseInt(_TID()),
            performed_by:   (function(){ try{ var u=JSON.parse(sessionStorage.getItem('vp_user')||'{}'); return u.name||u.username||'Staff'; }catch(e){ return 'Staff'; } })()
        };
        const res = await fetch(REC_PAYMENT_URL, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        showToast('Payment recorded — ' + mpFmt(amount) + ' via ' + method, 'success');
        mpClosePayModal();
        await mpLoadSeries();
    } catch(e) {
        showToast('Payment failed: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Confirm Payment';
    }
}

// Close modal on backdrop click
document.getElementById('mp-pay-modal').addEventListener('click', function(e){
    if (e.target === this) mpClosePayModal();
});

document.addEventListener('DOMContentLoaded', function(){
    mpLoadSeries();
});
</script>

</body>
